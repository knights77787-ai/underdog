<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumen | 키워드 등록</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="/static/css/theme.css" rel="stylesheet">
  <link href="/static/css/new_sound.css" rel="stylesheet">
  <link href="/static/css/footer.css" rel="stylesheet">
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand bg-white border-bottom shadow-sm">
    <div class="header-inner container-fluid">
      <div class="header-left"></div>
      <span class="header-logo-slot">
        <a href="/" class="header-logo-wrap fw-bold text-dark text-decoration-none">
          <img src="/static/img/lumen_logo.png" alt="Lumen" width="70" height="50">
        </a>
      </span>
      <div class="header-right">
        <div id="userDropdownWrap" class="dropdown d-none">
          <button id="btnUserIcon" class="btn btn-sm border-0 dropdown-toggle d-flex align-items-center" type="button" data-bs-toggle="dropdown" data-bs-auto-close="outside" aria-expanded="false" aria-label="사용자 메뉴">
            <span class="d-inline-block rounded-circle bg-secondary bg-opacity-25 d-flex align-items-center justify-content-center user-icon-circle">
              <svg xmlns="http://www.w3.org/2000/svg" class="user-icon-svg" fill="currentColor" viewBox="0 0 16 16"><path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10c-2.29 0-3.516.68-4.168 1.332-.678.678-.83 1.418-.832 1.664z"/></svg>
            </span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end shadow" id="userDropdownMenu">
            <li class="px-3 py-2 border-bottom">
              <div id="userDropdownName" class="fw-semibold text-body"></div>
              <div id="userDropdownEmail" class="small text-muted"></div>
            </li>
            <li><a class="dropdown-item" href="#" id="userDropdownSoundReg">소리등록</a></li>
            <li><a class="dropdown-item" href="#" id="userDropdownKeywordReg">키워드 등록</a></li>
            <li><a class="dropdown-item" href="#" id="userDropdownSettings">설정</a></li>
            <li><a class="dropdown-item" href="#" id="userDropdownLogout">로그아웃</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>

  <main class="container-fluid py-3 py-md-4 px-0">
    <div class="main-inner">
      <div class="center-shell">
      <div class="card shadow-sm border-0 main-card">
        <div class="card-body p-4 p-lg-5">

          <ul class="nav nav-tabs sound-tabs mb-4" role="tablist">
            <li class="nav-item" role="presentation">
              <button
                class="nav-link active"
                id="kw-register-tab"
                data-bs-toggle="tab"
                data-bs-target="#kwRegisterPanel"
                type="button"
                role="tab"
                aria-controls="kwRegisterPanel"
                aria-selected="true"
              >
                키워드 등록
              </button>
            </li>
            <li class="nav-item" role="presentation">
              <button
                class="nav-link"
                id="kw-list-tab"
                data-bs-toggle="tab"
                data-bs-target="#kwListPanel"
                type="button"
                role="tab"
                aria-controls="kwListPanel"
                aria-selected="false"
              >
                등록한 키워드 목록
              </button>
            </li>
          </ul>

          <div class="tab-content">
            <div
              class="tab-pane fade show active"
              id="kwRegisterPanel"
              role="tabpanel"
              aria-labelledby="kw-register-tab"
              tabindex="0"
            >
              <p class="text-muted small mb-3">
                실시간 자막(STT)에 이 문구가 포함되면 선택한 분류로 알림·자막 표시에 반영됩니다. 서버 기본 키워드(<code>event_types.json</code>)와 함께 판정됩니다.
              </p>
              <input type="hidden" id="kwEditingId" value="" />

              <div class="mb-3">
                <label for="kwPhrase" class="form-label fw-semibold">키워드</label>
                <input
                  id="kwPhrase"
                  type="text"
                  class="form-control"
                  maxlength="255"
                  placeholder="감지할 말(문구)"
                  autocomplete="off"
                />
              </div>

              <div class="mb-3">
                <label for="kwCategory" class="form-label fw-semibold">소리 알림 분류</label>
                <select id="kwCategory" class="form-select">
                  <option value="">선택</option>
                  <option value="danger">위험</option>
                  <option value="caution">경고</option>
                  <option value="alert">생활알림</option>
                </select>
              </div>

              <div id="kwStatus" class="status small mb-3"></div>

              <div class="d-flex flex-wrap gap-2 justify-content-md-end mt-1">
                <button id="btnKwCancelEdit" type="button" class="btn btn-outline-secondary d-none">
                  편집 취소
                </button>
                <button id="btnKwSubmit" type="button" class="btn btn-outline-primary btn-submit-sound px-4 py-2">
                  등록
                </button>
              </div>
            </div>

            <div
              class="tab-pane fade"
              id="kwListPanel"
              role="tabpanel"
              aria-labelledby="kw-list-tab"
              tabindex="0"
            >
              <h5 class="mb-3">등록한 키워드 목록</h5>
              <p class="small text-body mb-0">편집·삭제는 각 행의 버튼을 사용하세요.</p>
              <div id="kwListStatus" class="small text-muted sound-list-status-line mb-2">
                불러오는 중…
              </div>
              <div id="kwList" class="sound-list"></div>
            </div>
          </div>

        </div>
      </div>
    </div>
    </div>
  </main>

  <footer class="app-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <img src="/static/img/lumen_logo.png" alt="Lumen">
        <span>Lumen</span>
      </div>
      <div class="footer-links">
        <a href="/">홈</a>
        <a href="/new-sound">소리 등록</a>
        <a href="/keywords-page">키워드</a>
        <a href="/settings-page">설정</a>
      </div>
      <div class="footer-copy">© Lumen. 실시간 자막·소리 감지 서비스.</div>
    </div>
  </footer>

  <div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/config.js"></script>
  <script src="/static/js/common/messages.js"></script>
  <script src="/static/js/common/toast_ui.js"></script>
  <script src="/static/js/common/status_ui.js"></script>
  <script src="/static/js/common/auth_nav.js"></script>
  <script src="/static/js/keywords.js"></script>
</body>
</html>
