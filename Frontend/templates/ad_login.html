<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumen | 관리자 로그인</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/admin.css" rel="stylesheet">
</head>
<body class="bg-light">
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-6 col-lg-4">
        <a href="/" class="d-block text-center mb-4 admin-login-logo">
          <img src="/static/img/lumen_logo.png" alt="Lumen" class="admin-login-logo-img">
        </a>
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h1 class="h5 fw-bold mb-3">관리자 로그인</h1>
            <p class="text-muted small mb-4">관리자 토큰을 입력하세요. (.env의 ADMIN_TOKEN)</p>

            <form id="adminLoginForm">
              <div class="mb-3">
                <label for="adminToken" class="form-label">관리자 토큰</label>
                <input
                  type="password"
                  id="adminToken"
                  class="form-control"
                  placeholder="ADMIN_TOKEN"
                  autocomplete="off"
                />
              </div>
              <div id="loginError" class="alert alert-danger py-2 mb-3 d-none" role="alert"></div>
              <button type="submit" id="btnLogin" class="btn btn-primary w-100">
                로그인
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    (function () {
      const API_BASE = window.APP_CONFIG?.API_BASE || "";
      const form = document.getElementById("adminLoginForm");
      const inputToken = document.getElementById("adminToken");
      const btnLogin = document.getElementById("btnLogin");
      const loginError = document.getElementById("loginError");

      function showError(msg) {
        loginError.textContent = msg || "";
        loginError.classList.toggle("d-none", !msg);
      }

      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        const token = (inputToken.value || "").trim();

        btnLogin.disabled = true;
        showError("");

        try {
          const res = await fetch((API_BASE || "") + "/auth/admin/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token }),
            redirect: "follow",
          });

          if (res.redirected) {
            window.location.href = res.url;
            return;
          }

          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            showError(data.detail || "로그인에 실패했습니다.");
            btnLogin.disabled = false;
            return;
          }

          window.location.href = "/admin";
        } catch (err) {
          console.error(err);
          showError("서버에 연결할 수 없습니다.");
          btnLogin.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
