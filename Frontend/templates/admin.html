<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Lumen | 관리자 대시보드 </title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/admin.css" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar bg-white border-bottom shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="/admin">
        <img src="/static/img/lumen_logo.png" alt="Lumen" width="70" height="50">
        관리자 대시보드
      </a>
      <div class="d-flex align-items-center gap-2">
        <form id="logoutForm" action="/auth/admin/logout" method="post" class="d-inline">
          <button type="submit" class="btn btn-outline-secondary btn-sm">로그아웃</button>
        </form>
      </div>
    </div>
  </nav>

  <main class="container-fluid py-4">
    <!-- 1. 개요·실시간 현황 -->
    <section class="mb-4">
      <h2 class="h6 fw-bold mb-3 text-secondary">1. 개요·실시간 현황</h2>
      <div class="card shadow-sm">
        <div class="card-body">
          <div id="overviewCards" class="row g-2 g-md-3">
            <!-- JS에서 채움 -->
          </div>
          <div id="overviewQueues" class="mt-3 small text-muted"></div>
          <div id="overviewMetrics" class="mt-1 small text-muted"></div>
          <div id="overviewError" class="alert alert-warning py-2 mt-2 d-none"></div>
        </div>
      </div>
    </section>

    <!-- 2. 피드백 목록 -->
    <section class="mb-4">
      <h2 class="h6 fw-bold mb-3 text-secondary">2. 피드백 목록</h2>
      <div class="card shadow-sm">
        <div class="card-header d-flex flex-wrap align-items-center gap-2 py-2">
          <input type="date" id="filterDateFrom" class="form-control form-control-sm" style="width:auto" title="시작일">
          <span class="text-muted">~</span>
          <input type="date" id="filterDateTo" class="form-control form-control-sm" style="width:auto" title="종료일">
          <span class="text-muted small">(최근 30일)</span>
          <select id="filterEventType" class="form-select form-select-sm" style="width:auto">
            <option value="">전체 분류</option>
            <option value="danger">위험/경고</option>
            <option value="caution">주의</option>
            <option value="alert">일상</option>
          </select>
          <select id="filterVote" class="form-select form-select-sm" style="width:auto">
            <option value="">전체</option>
            <option value="up">맞아요</option>
            <option value="down">아니에요(오탐)</option>
          </select>
          <button id="btnLoadFeedback" class="btn btn-sm btn-primary">조회</button>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-sm mb-0">
              <thead class="table-light">
                <tr>
                  <th style="width:90px">일시</th>
                  <th style="width:70px">구분</th>
                  <th style="width:90px">분류</th>
                  <th style="width:100px">키워드</th>
                  <th>내용</th>
                  <th style="width:80px">세션</th>
                  <th style="width:120px">코멘트</th>
                </tr>
              </thead>
              <tbody id="feedbackTbody"></tbody>
            </table>
          </div>
        </div>
        <div id="feedbackEmpty" class="card-body text-muted small d-none">피드백 데이터가 없습니다.</div>
        <div id="feedbackError" class="alert alert-warning py-2 mx-3 mb-3 d-none"></div>
      </div>
    </section>
  </main>

  <script src="/static/js/admin.js"></script>
</body>
</html>
