<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumen | 관리자 대시보드 </title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/admin.css" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar bg-white border-bottom shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="/admin">
        <img src="/static/img/lumen_logo.png" alt="Lumen" width="70" height="50">
        Lumen
      </a>
      <div class="d-flex align-items-center gap-2">
        <span class="text-muted small">관리자 대시보드</span>
        <form id="logoutForm" action="/auth/admin/logout" method="post" class="d-inline">
          <button type="submit" class="btn btn-outline-secondary btn-sm">로그아웃</button>
        </form>
      </div>
    </div>
  </nav>

  <main class="container-fluid py-4">
    <!-- 1. 개요·실시간 현황 -->
    <section class="mb-4">
      <h2 class="h6 fw-bold mb-3 text-secondary">1. 개요·실시간 현황</h2>
      <div class="card shadow-sm">
        <div class="card-body">
          <div id="overviewCards" class="row g-2 g-md-3">
            <!-- JS에서 채움 -->
          </div>
          <div id="overviewQueues" class="mt-3 small text-muted"></div>
          <div id="overviewMetrics" class="mt-1 small text-muted"></div>
          <div id="overviewError" class="alert alert-warning py-2 mt-2 d-none"></div>
        </div>
      </div>
    </section>

    <!-- 2. 이벤트·알림 -->
    <section class="mb-4">
      <h2 class="h6 fw-bold mb-3 text-secondary">2. 이벤트·알림</h2>
      <div class="card shadow-sm">
        <div class="card-header d-flex flex-wrap align-items-center gap-2 py-2">
          <div class="d-flex gap-2 flex-wrap">
            <input type="date" id="filterDate" class="form-control form-control-sm" style="width:auto">
            <input type="text" id="filterSession" class="form-control form-control-sm" placeholder="세션 ID" style="width:8rem">
            <button id="btnLoadAlerts" class="btn btn-sm btn-primary">조회</button>
          </div>
          <span id="summaryText" class="ms-auto small text-muted"></span>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-sm table-hover mb-0">
              <thead class="table-light">
                <tr>
                  <th style="width:90px">시간</th>
                  <th style="width:70px">유형</th>
                  <th style="width:120px">키워드</th>
                  <th>내용</th>
                  <th style="width:90px">세션</th>
                </tr>
              </thead>
              <tbody id="alertsTbody"></tbody>
            </table>
          </div>
          <div class="card-footer py-2">
            <button id="btnLoadMoreAlerts" class="btn btn-sm btn-outline-secondary" style="display:none">더 보기</button>
            <span id="alertsStatus" class="ms-2 small text-muted"></span>
          </div>
        </div>
        <div id="alertsError" class="alert alert-warning py-2 mx-3 mb-3 d-none"></div>
      </div>
    </section>

    <!-- 3. 피드백 분석 -->
    <section class="mb-4">
      <h2 class="h6 fw-bold mb-3 text-secondary">3. 피드백 분석</h2>
      <div class="row g-3">
        <!-- 키워드별 피드백 -->
        <div class="col-12 col-lg-7">
          <div class="card shadow-sm h-100">
            <div class="card-header py-2 fw-semibold">키워드별 피드백 (down_rate 순)</div>
            <div class="card-body p-0">
              <div class="table-responsive">
                <table class="table table-sm mb-0">
                  <thead class="table-light">
                    <tr>
                      <th>키워드</th>
                      <th>유형</th>
                      <th>up</th>
                      <th>down</th>
                      <th>down_rate</th>
                    </tr>
                  </thead>
                  <tbody id="feedbackSummaryTbody"></tbody>
                </table>
              </div>
            </div>
            <div id="feedbackSummaryEmpty" class="card-body text-muted small d-none">피드백 데이터가 없습니다.</div>
            <div id="feedbackSummaryError" class="alert alert-warning py-2 mx-3 mb-3 d-none"></div>
          </div>
        </div>
        <!-- 오탐 의심 키워드 -->
        <div class="col-12 col-lg-5">
          <div class="card shadow-sm h-100">
            <div class="card-header py-2 fw-semibold">오탐 의심 키워드</div>
            <div class="card-body">
              <p class="small text-muted mb-2">down ≥ 60%, 건수 ≥ 5 건</p>
              <ul id="feedbackSuspectsList" class="list-group list-group-flush list-group-sm"></ul>
              <div id="feedbackSuspectsEmpty" class="text-muted small d-none">해당 조건의 키워드가 없습니다.</div>
            </div>
            <div id="feedbackSuspectsError" class="alert alert-warning py-2 mx-3 mb-3 d-none"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="/static/js/admin.js"></script>
</body>
</html>
