<!-- Underdog · 설정 -->
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lumen | 설정</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="/static/css/theme.css" rel="stylesheet">
  <link href="/static/css/settings.css" rel="stylesheet">
  <link href="/static/css/footer.css" rel="stylesheet">
</head>
<body class="bg-light settings-page">
  <nav class="navbar bg-white border-bottom">
    <div class="header-inner container-fluid">
      <div class="header-left"></div>
      <span class="header-logo-slot">
        <a href="/" class="header-logo-wrap fw-bold text-dark text-decoration-none">
          <img src="/static/img/lumen_logo.png" alt="Lumen" width="70" height="50">
        </a>
      </span>
      <div class="header-right">
        <!-- 사용자 아이콘 + 드롭다운 -->
        <div id="userDropdownWrap" class="dropdown">
          <button id="btnUserIcon" class="btn btn-sm border-0 dropdown-toggle d-flex align-items-center" type="button" data-bs-toggle="dropdown" data-bs-auto-close="outside" aria-expanded="false" aria-label="사용자 메뉴">
            <span class="d-inline-block rounded-circle bg-secondary bg-opacity-25 d-flex align-items-center justify-content-center user-icon-circle">
              <svg xmlns="http://www.w3.org/2000/svg" class="user-icon-svg" fill="currentColor" viewBox="0 0 16 16"><path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10c-2.29 0-3.516.68-4.168 1.332-.678.678-.83 1.418-.832 1.664z"/></svg>
            </span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end shadow" id="userDropdownMenu">
            <li class="px-3 py-2 border-bottom">
              <div id="userDropdownName" class="fw-semibold text-body"></div>
              <div id="userDropdownEmail" class="small text-muted"></div>
            </li>
            <li><a class="dropdown-item" href="#" id="userDropdownSoundReg">소리등록</a></li>
            <li><a class="dropdown-item" href="#" id="userDropdownKeywordReg">키워드 등록</a></li>
            <li><a class="dropdown-item" href="#" id="userDropdownSettings">설정</a></li>
            <li><a class="dropdown-item" href="#" id="userDropdownLogout">로그아웃</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>

  <main class="container-fluid py-5">
    <div class="main-inner">
      <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6">
        <div class="card shadow-sm">
          <div class="card-header fw-semibold">설정</div>
          <div class="card-body p-4 p-md-5">
            <form id="settingsForm" class="settings-form">
              <div class="mb-4">
                <label for="settingFontSize" class="form-label fw-semibold">글자 크기</label>
                <input type="number" class="form-control" id="settingFontSize" min="10" max="60" value="20" style="max-width: 6rem">
                <div class="form-text">실시간 자막의 글자 크기 (10~60)</div>
              </div>
              <div class="mb-4">
                <div class="form-check form-switch">
                  <input class="form-check-input" type="checkbox" id="settingAlertEnabled" checked>
                  <label class="form-check-label" for="settingAlertEnabled">알림 사용</label>
                </div>
                <div class="form-text">감지 시 알림·진동 사용 여부</div>
              </div>
              <div class="mb-4">
                <label for="settingCooldownSec" class="form-label fw-semibold">쿨다운(초)</label>
                <input type="number" class="form-control" id="settingCooldownSec" min="0" max="60" value="5" style="max-width: 6rem">
                <div class="form-text">같은 종류 알림 간 최소 간격 (0~60초)</div>
              </div>
              <div class="mb-4">
                <div class="form-check form-switch">
                  <input class="form-check-input" type="checkbox" id="settingAutoScroll" checked>
                  <label class="form-check-label" for="settingAutoScroll">자동 스크롤</label>
                </div>
                <div class="form-text">실시간 자막 영역 자동 스크롤</div>
              </div>
              <div class="d-flex align-items-center gap-2">
                <button type="submit" class="btn btn-primary" id="btnSettingsSave">저장</button>
                <span class="small text-muted" id="settingsStatus"></span>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
    </div>
  </main>

  <footer class="app-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <img src="/static/img/lumen_logo.png" alt="Lumen">
        <span>Lumen</span>
      </div>
      <div class="footer-links">
        <a href="/">홈</a>
        <a href="/new-sound">소리 등록</a>
        <a href="/keywords-page">키워드</a>
        <a href="/settings-page">설정</a>
      </div>
      <div class="footer-copy">© Lumen. 실시간 자막·소리 감지 서비스.</div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/config.js"></script>
  <script src="/static/js/common/messages.js"></script>
  <script src="/static/js/common/toast_ui.js"></script>
  <script src="/static/js/common/status_ui.js"></script>
  <script src="/static/js/common/auth_nav.js"></script>
  <script src="/static/js/settings.js"></script>
</body>
</html>
