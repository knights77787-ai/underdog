<!-- Underdog · 설정 -->
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Underdog · 설정</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/theme.css" rel="stylesheet">
  <link href="/static/css/settings.css" rel="stylesheet">
  <link href="/static/css/footer.css" rel="stylesheet">
</head>
<body class="bg-light settings-page">
  <nav class="navbar bg-white border-bottom">
    <div class="header-inner container-fluid d-flex align-items-center gap-2 flex-wrap">
      <a href="/" class="fw-bold text-dark text-decoration-none">
        <img src="/static/img/lumen_logo.png" alt="Lumen" width="70" height="50">
      </a>
      <a href="/live" class="btn btn-sm btn-outline-primary ms-auto" id="btnBackToLive">라이브로 돌아가기</a>
    </div>
  </nav>

  <main class="container-fluid py-5">
    <div class="main-inner">
      <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6">
        <div class="card shadow-sm">
          <div class="card-header fw-semibold">설정</div>
          <div class="card-body p-4 p-md-5">
            <form id="settingsForm" class="settings-form">
              <div class="mb-4">
                <label for="settingFontSize" class="form-label fw-semibold">글자 크기</label>
                <input type="number" class="form-control" id="settingFontSize" min="10" max="60" value="20" style="max-width: 6rem">
                <div class="form-text">실시간 자막의 글자 크기 (10~60)</div>
              </div>
              <div class="mb-4">
                <div class="form-check form-switch">
                  <input class="form-check-input" type="checkbox" id="settingAlertEnabled" checked>
                  <label class="form-check-label" for="settingAlertEnabled">알림 사용</label>
                </div>
                <div class="form-text">감지 시 알림·진동 사용 여부</div>
              </div>
              <div class="mb-4">
                <label for="settingCooldownSec" class="form-label fw-semibold">쿨다운(초)</label>
                <input type="number" class="form-control" id="settingCooldownSec" min="0" max="60" value="5" style="max-width: 6rem">
                <div class="form-text">같은 종류 알림 간 최소 간격 (0~60초)</div>
              </div>
              <div class="mb-4">
                <div class="form-check form-switch">
                  <input class="form-check-input" type="checkbox" id="settingAutoScroll" checked>
                  <label class="form-check-label" for="settingAutoScroll">자동 스크롤</label>
                </div>
                <div class="form-text">실시간 자막 영역 자동 스크롤</div>
              </div>
              <div class="d-flex align-items-center gap-2">
                <button type="submit" class="btn btn-primary" id="btnSettingsSave">저장</button>
                <span class="small text-muted" id="settingsStatus"></span>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
    </div>
  </main>

  <footer class="app-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <img src="/static/img/lumen_logo.png" alt="Lumen">
        <span>Lumen</span>
      </div>
      <div class="footer-links">
        <a href="/">홈</a>
        <a href="/live">라이브</a>
        <a href="/new-sound">소리 등록</a>
      </div>
      <div class="footer-copy">© Lumen. 실시간 자막·소리 감지 서비스.</div>
    </div>
  </footer>

  <script src="/static/js/config.js"></script>
  <script src="/static/js/settings.js"></script>
</body>
</html>
