<!-- Underdog · 로그인 (게스트 / 구글 / 카카오) -->
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Underdog · 로그인</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/theme.css" rel="stylesheet">
  <link href="/static/css/login.css" rel="stylesheet">
</head>
<body class="bg-light login-page">
  <nav class="navbar bg-white border-bottom">
    <div class="container-fluid d-flex align-items-center gap-2 flex-wrap">
      <a href="/" class="fw-bold text-dark text-decoration-none">
        <img src="/static/img/lumen_logo.png" alt="Lumen" width="70" height="50">
      </a>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-5">
        <div class="card shadow-sm">
          <div class="card-body p-4 p-md-5">
            <h1 class="h4 fw-bold mb-2">시작하기</h1>
            <p class="text-muted small mb-4">라이브 자막·알림을 사용하려면 아래 방법 중 하나로 들어가세요.</p>

            <div class="d-grid gap-2">
              <a id="linkGoogle" href="#" class="btn btn-outline-secondary btn-lg d-flex align-items-center justify-content-center gap-2">
                <span>Google로 로그인</span>
              </a>
              <a id="linkKakao" href="#" class="btn btn-warning btn-lg text-dark d-flex align-items-center justify-content-center gap-2">
                <span>카카오로 로그인</span>
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="/static/js/config.js"></script>
  <script>
    (function () {
      const API_BASE = window.APP_CONFIG?.API_BASE || document.location.origin;

      const linkGoogle = document.getElementById("linkGoogle");
      const linkKakao = document.getElementById("linkKakao");

      linkGoogle.href = API_BASE + "/auth/google/login";
      linkKakao.href = API_BASE + "/auth/kakao/login";
    })();
  </script>
</body>
</html>
