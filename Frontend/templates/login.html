<!-- Underdog · 로그인 (게스트 / 구글 / 카카오) -->
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lument | 로그인</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="/static/css/theme.css" rel="stylesheet">
  <link href="/static/css/login.css" rel="stylesheet">
  <link href="/static/css/footer.css" rel="stylesheet">
</head>
<body class="login-page">
  <nav class="navbar navbar-login">
    <div class="container-fluid">
      <a href="/" class="navbar-brand-login">
        <img src="/static/img/lumen_logo.png" alt="Lumen" width="70" height="50">
      </a>
    </div>
  </nav>

  <main class="login-main">
    <div class="login-hero">
      <h1 class="login-title">시작하기</h1>
      <p class="login-tagline">실시간 자막·소리 감지·맞춤 알림까지<br>하나의 서비스에서 경험하세요</p>
    </div>

    <div class="login-card-wrap">
      <div class="login-card">
        <div class="login-card-header">
          <h2 class="login-card-title">로그인</h2>
          <p class="login-card-desc">아래 방법 중 하나로 계속하세요</p>
        </div>
        <div class="login-card-body">
          <a id="linkGoogle" href="#" class="btn btn-login btn-google">
            <i class="bi bi-google"></i>
            <span>Google로 로그인</span>
          </a>
          <a id="linkKakao" href="#" class="btn btn-login btn-kakao">
            <svg class="kakao-icon" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
              <path d="M12 3c-5.52 0-10 3.58-10 8 0 2.89 1.89 5.43 4.72 6.88-.2.72-.72 2.59-.82 2.99-.13.49.19.48.41.35.17-.1 2.68-1.84 3.76-2.63.53.07 1.08.11 1.63.11 5.52 0 10-3.58 10-8s-4.48-8-10-8z"/>
            </svg>
            <span>카카오로 로그인</span>
          </a>
        </div>
      </div>
    </div>

    <div class="login-features">
      <div class="login-feature">
        <i class="bi bi-mic-fill"></i>
        <span>실시간 음성 인식</span>
      </div>
      <div class="login-feature">
        <i class="bi bi-volume-up-fill"></i>
        <span>환경음·소리 감지</span>
      </div>
      <div class="login-feature">
        <i class="bi bi-bell-fill"></i>
        <span>맞춤 알림</span>
      </div>
    </div>
  </main>

  <footer class="app-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <img src="/static/img/lumen_logo.png" alt="Lumen">
        <span>Lumen</span>
      </div>
      <div class="footer-links">
        <a href="/">홈</a>
        <a href="/live">라이브</a>
      </div>
      <div class="footer-copy">© Lumen. 실시간 자막·소리 감지 서비스.</div>
    </div>
  </footer>

  <script src="/static/js/config.js"></script>
  <script>
    (function () {
      const API_BASE = window.APP_CONFIG?.API_BASE || document.location.origin;

      const linkGoogle = document.getElementById("linkGoogle");
      const linkKakao = document.getElementById("linkKakao");

      linkGoogle.href = API_BASE + "/auth/google/login";
      linkKakao.href = API_BASE + "/auth/kakao/login";
    })();
  </script>
</body>
</html>
