<!-- Underdog>Frontend>templates>index.html -->
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Underdog · Live (Single User) Main Hompage</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- App CSS -->
  <link href="/static/css/index.css" rel="stylesheet">
</head>

<body class="bg-light">

  <!-- Topbar -->
  <nav class="navbar bg-white border-bottom">
    <div class="container-fluid d-flex align-items-center gap-2">
      <a href="/" class="fw-bold text-dark text-decoration-none">Underdog · Live</a>
      <a href="/login" class="btn btn-sm btn-outline-secondary ms-2">다른 계정</a>

      <!-- WS Buttons -->
      <button id="btnConnect" class="btn btn-sm btn-primary ms-2">Connect</button>
      <button id="btnDisconnect" class="btn btn-sm btn-outline-secondary" disabled>Disconnect</button>

      <!-- Status -->
      <span id="wsBadge" class="badge text-bg-secondary ms-2">Disconnected</span>
      <span id="loginLabel" class="badge bg-light text-dark border ms-2" style="display:none;"></span>
      <span id="sessionLabel" class="small text-muted ms-2 d-none d-md-inline"></span>

      <!-- (optional) Save toggle (UI only) -->
      <div class="ms-3 d-flex align-items-center gap-2">
        <span class="small text-muted">기록저장</span>
        <div class="form-check form-switch m-0">
          <input class="form-check-input" type="checkbox" role="switch" id="saveToggle">
        </div>
      </div>

      <!-- 설정 토글 -->
      <button class="btn btn-sm btn-outline-secondary ms-2" type="button" data-bs-toggle="collapse" data-bs-target="#settingsCollapse" aria-expanded="false" aria-controls="settingsCollapse" id="btnSettingsToggle">설정</button>
    </div>
  </nav>

  <!-- 설정 패널 (접기/펼치기) -->
  <div class="collapse border-bottom bg-white" id="settingsCollapse">
    <div class="container-fluid py-3">
      <div class="row align-items-end">
        <div class="col-auto">
          <label class="form-label small mb-0 me-2">글자 크기</label>
          <input type="number" class="form-control form-control-sm" id="settingFontSize" min="10" max="60" value="20" style="width:4rem">
        </div>
        <div class="col-auto">
          <div class="form-check form-switch mb-0">
            <input class="form-check-input" type="checkbox" id="settingAlertEnabled" checked>
            <label class="form-check-label small" for="settingAlertEnabled">알림 사용</label>
          </div>
        </div>
        <div class="col-auto">
          <label class="form-label small mb-0 me-2">쿨다운(초)</label>
          <input type="number" class="form-control form-control-sm" id="settingCooldownSec" min="0" max="60" value="5" style="width:4rem">
        </div>
        <div class="col-auto">
          <div class="form-check form-switch mb-0">
            <input class="form-check-input" type="checkbox" id="settingAutoScroll" checked>
            <label class="form-check-label small" for="settingAutoScroll">자동 스크롤</label>
          </div>
        </div>
        <div class="col-auto ms-2">
          <button type="button" class="btn btn-sm btn-primary" id="btnSettingsSave">저장</button>
        </div>
        <div class="col-auto small text-muted" id="settingsStatus"></div>
      </div>
    </div>
  </div>

  <main class="container-fluid py-3">
    <div class="row g-3">

      <!-- Left: Hero + Logs -->
      <div class="col-12 col-lg-8">

        <!-- Hero (최근 위험 이벤트) -->
        <div class="card shadow-sm mb-3">
          <div class="card-body d-flex align-items-center justify-content-between gap-3">
            <div class="d-flex align-items-center gap-3">
              <div id="heroBadge" class="badge bg-secondary-subtle text-secondary border px-3 py-2">
                상태
              </div>

              <div>
                <div class="fs-5 fw-bold" id="heroTitle">대기중</div>
                <div class="text-muted small" id="heroDesc">아직 이벤트가 없습니다.</div>
              </div>
            </div>

            <!-- Feedback (UI only today) -->
            <div class="d-flex gap-2">
              <button id="btnFeedbackYes" class="btn btn-sm btn-outline-success" disabled>맞아요</button>
              <button id="btnFeedbackNo" class="btn btn-sm btn-outline-danger" disabled>아니에요(오탐)</button>
            </div>
          </div>
        </div>

        <!-- Recent Logs Table -->
        <div class="card shadow-sm">
          <div class="card-header fw-semibold">최근 감지 로그</div>
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-sm table-striped mb-0 align-middle">
                <thead class="table-light">
                  <tr>
                    <th style="width:90px;">시간</th>
                    <th style="width:110px;">종류</th>
                    <th>내용</th>
                    <th style="width:90px;">확률</th>
                  </tr>
                </thead>
                <tbody id="logTbody"></tbody>
              </table>
            </div>
          </div>
          <div class="card-footer small text-muted">
            * 서버가 보내는 caption/alert를 이 표에 쌓습니다.
          </div>
        </div>
      </div>

      <!-- Right: Mic + Captions -->
      <div class="col-12 col-lg-4">

        <!-- Mic box -->
        <div class="card shadow-sm mb-3">
          <div class="card-body text-center">
            <div class="mic-icon mb-2">🎙️</div>
            <div class="fw-semibold" id="micTitle">소리 감지 대기중</div>
            <div class="text-muted small" id="micDesc">마이크 사용 승인이 필요합니다.</div>

            <button id="btnMic" class="btn btn-sm btn-outline-primary mt-3">
              마이크 권한 요청
            </button>
          </div>
        </div>

        <!-- Caption stream -->
        <div class="card shadow-sm">
          <div class="card-header fw-semibold">실시간 자막</div>
          <div class="card-body">
            <div id="captionBox" class="caption-box"></div>
          </div>

          <!-- Test sender (optional) -->
          <div class="card-footer bg-white">
            <div class="input-group input-group-sm">
              <input id="testInput" class="form-control" placeholder="(테스트) 불이야 / 도와줘 입력" />
              <button id="btnSendCaption" class="btn btn-outline-primary" disabled>보내기</button>
            </div>
            <div class="small text-muted mt-1">
              * 서버가 send_caption을 지원하면 동작합니다.
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- Toast container -->
  <div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="/static/js/wsClient.js"></script>
  <script src="/static/js/live.js"></script>
</body>
</html>
