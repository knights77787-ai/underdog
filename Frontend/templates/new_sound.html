<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Lumen | 소리 등록</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="/static/css/theme.css" rel="stylesheet">
  <link href="/static/css/new_sound.css" rel="stylesheet">
  <link href="/static/css/footer.css" rel="stylesheet">
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand bg-white border-bottom shadow-sm">
    <div class="header-inner container-fluid">
      <div class="header-left"></div>
      <span class="header-logo-slot">
        <a href="/" class="header-logo-wrap fw-bold text-dark text-decoration-none">
          <img src="/static/img/lumen_logo.png" alt="Lumen" width="70" height="50">
        </a>
      </span>
      <div class="header-right">
        <!-- 사용자 아이콘 + 드롭다운 (로그인 후) -->
        <div id="userDropdownWrap" class="dropdown d-none">
          <button id="btnUserIcon" class="btn btn-sm border-0 dropdown-toggle d-flex align-items-center" type="button" data-bs-toggle="dropdown" data-bs-auto-close="outside" aria-expanded="false" aria-label="사용자 메뉴">
            <span class="d-inline-block rounded-circle bg-secondary bg-opacity-25 d-flex align-items-center justify-content-center user-icon-circle">
              <svg xmlns="http://www.w3.org/2000/svg" class="user-icon-svg" fill="currentColor" viewBox="0 0 16 16"><path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10c-2.29 0-3.516.68-4.168 1.332-.678.678-.83 1.418-.832 1.664z"/></svg>
            </span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end shadow" id="userDropdownMenu">
            <li class="px-3 py-2 border-bottom">
              <div id="userDropdownName" class="fw-semibold text-body"></div>
              <div id="userDropdownEmail" class="small text-muted"></div>
            </li>
            <li><a class="dropdown-item" href="#" id="userDropdownSoundReg">소리등록</a></li>
            <li><a class="dropdown-item" href="#" id="userDropdownSettings">설정</a></li>
            <li><a class="dropdown-item" href="#" id="userDropdownLogout">로그아웃</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>

  <main class="container-fluid py-4">
    <div class="main-inner">
      <div class="center-shell">
      <div class="card shadow-sm border-0 main-card">
        <div class="card-body p-4 p-lg-5">

          <!-- Bootstrap Toggleable 메뉴 Tabs -->
          <ul class="nav nav-tabs sound-tabs mb-4" role="tablist">
            <li class="nav-item" role="presentation">
              <button
                class="nav-link active"
                id="register-tab"
                data-bs-toggle="tab"
                data-bs-target="#registerPanel"
                type="button"
                role="tab"
                aria-controls="registerPanel"
                aria-selected="true"
              >
                새로운 소리 등록
              </button>
            </li>

            <li class="nav-item" role="presentation">
              <button
                class="nav-link"
                id="list-tab"
                data-bs-toggle="tab"
                data-bs-target="#listPanel"
                type="button"
                role="tab"
                aria-controls="listPanel"
                aria-selected="false"
              >
                내가 등록한 소리 목록
              </button>
            </li>
          </ul>

          <!-- Tab panels -->
          <div class="tab-content">

            <!-- 🟠새로운 소리 등록 -->
            <div
              class="tab-pane fade show active"
              id="registerPanel"
              role="tabpanel"
              aria-labelledby="register-tab"
              tabindex="0">

              <div class="record-shell mx-auto mb-4">
                <p class="text-center text-muted helper-text mb-4">
                  가능한 주변 소음 없는 조용한 환경에서 녹음해주세요. 더 좋은 품질로 변환할 수 있어요.
                </p>

                <div class="rec-indicator-wrap mb-4" id="recIndicatorWrap">
                  <div class="rec-indicator">
                    <span class="rec-pulse rec-pulse-1"></span>
                    <span class="rec-pulse rec-pulse-2"></span>
                    <span class="rec-pulse rec-pulse-3"></span>
                    <span class="rec-core"></span>
                  </div>
                </div>

                <div class="d-flex justify-content-center flex-wrap gap-2 align-items-center">
                  <button id="btnStart" type="button" class="btn btn-outline-danger btn-sm rounded-pill px-3">
                    ● 녹음
                  </button>
                  <button id="btnStop" type="button" class="btn btn-outline-secondary btn-sm rounded-pill px-3" disabled>
                    ■ 중지
                  </button>
                  <div id="timer" class="timer-pill">00:00</div>
                </div>
                <p id="recRerecordHint" class="text-center text-muted small mt-2 mb-0 d-none">
                  다시 녹음하려면 녹음 버튼을 눌러주세요
                </p>

                <audio id="audioPreview" hidden controls class="w-100 mt-3"></audio>
              </div>

              <div id="status" class="status small mb-3"></div>

              <div class="mb-3">
                <label for="fileInput" class="form-label fw-semibold">
                  녹음 파일 업로드
                  <span class="text-muted small">(파일 형식: .mp3, .wav, .webm, .m4a)</span>
                </label>
                <input id="fileInput" type="file" class="form-control" accept=".mp3,.wav,.webm,.m4a,audio/*">
                <div id="fileMeta" class="form-text"></div>
              </div>

              <div class="mb-3">
                <label for="soundName" class="form-label fw-semibold">소리 이름</label>
                <input
                  id="soundName"
                  type="text"
                  class="form-control"
                  placeholder="예: 초인종, 세탁기 완료음">
              </div>

              <div class="mb-3">
                <label for="soundCategory" class="form-label fw-semibold">소리 알림 분류</label>
                <select id="soundCategory" class="form-select">
                  <option value="">선택</option>
                  <option value="danger">위험/경고</option>
                  <option value="caution">주의</option>
                  <option value="alert">생활알림</option>
                </select>
              </div>

              

              <div class="d-flex justify-content-end">
                <button id="btnSubmit" type="button" class="btn btn-outline-secondary px-4">
                  등록
                </button>
              </div>
            </div>

          <!-- 🟠내가 등록한 소리 목록 -->
          <div
            class="tab-pane fade"
            id="listPanel"
            role="tabpanel"
            aria-labelledby="list-tab"
            tabindex="0"
          >
            <div class="d-flex align-items-center justify-content-between mb-3">
              <div>
                <h5 class="mb-1">내가 등록한 소리 목록</h5>
                <p class="text-muted small mb-0">등록한 커스텀 소리를 여기서 확인합니다.</p>
              </div>
            </div>

            <div id="soundListStatus" class="small text-muted mb-3">
              등록된 소리가 없습니다
            </div>

            <div id="soundList" class="sound-list"><!-- 실제 API 목록 받아올 자리--> </div>

          </div> <!-- end of listPanel -->

          </div> <!-- end of tab-content -->

        </div> <!-- end of card-body-->
      </div>
    </div>
    </div>
  </main>

  <footer class="app-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <img src="/static/img/lumen_logo.png" alt="Lumen">
        <span>Lumen</span>
      </div>
      <div class="footer-links">
        <a href="/">홈</a>
        <a href="/new-sound">소리 등록</a>
        <a href="/settings-page">설정</a>
      </div>
      <div class="footer-copy">© Lumen. 실시간 자막·소리 감지 서비스.</div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/config.js"></script>
  <script src="/static/js/new_sound.js"></script>
</body>
</html>
